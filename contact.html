<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Popek Christian</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap');
    :root{--bg:#0f172a;--bg2:#0b1225;--text:#e2e8f0;--muted:#9aa9c3;--card:rgba(255,255,255,.06);--stroke:rgba(255,255,255,.12);--acc:#7c3aed;--acc2:#06b6d4;--shadow:0 10px 30px rgba(0,0,0,.35);--r:16px}
    *{box-sizing:border-box}
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    body {
      font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% -10%, rgba(124,58,237,.25),transparent 60%),radial-gradient(800px 500px at 100% 0%, rgba(6,182,212,.22),transparent 55%),linear-gradient(180deg,var(--bg),var(--bg2));
    }
    main {
      flex: 1;
    }
    .container{width:min(1100px,92%);margin:auto}
    nav.nav{width:100%;margin:0 auto;position:sticky;top:16px;z-index:50;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:8px;padding:12px;border-radius:28px;background:rgba(255,255,255,.04);backdrop-filter:blur(10px);border:1px solid var(--stroke);box-shadow:var(--shadow)}
    nav.nav a,.dropdown-toggle{position:relative;color:var(--text);text-decoration:none;font-weight:700;padding:10px 16px;border-radius:999px;opacity:.88;transition:transform .15s ease,opacity .15s ease,box-shadow .15s ease,background .15s ease;display:flex;align-items:center;justify-content:center;min-height:44px}
    nav.nav a:hover,.dropdown:hover .dropdown-toggle{opacity:1;transform:translateY(-1px)}
    nav.nav a.active,.dropdown.active .dropdown-toggle{background:linear-gradient(90deg,var(--acc),var(--acc2));color:#fff;opacity:1;box-shadow:0 6px 18px rgba(124,58,237,.35)}
    .dropdown{position:relative}
    .dropdown::after{content:"";position:absolute;left:0;right:0;top:100%;height:14px}
    .dropdown:hover .dropdown-menu{display:flex}
    .dropdown-menu{display:none;flex-direction:column;gap:4px;position:absolute;top:calc(100% + 2px);left:50%;transform:translateX(-50%);background:rgba(15,23,42,.96);padding:10px;border-radius:14px;border:1px solid var(--stroke);box-shadow:var(--shadow);z-index:1000;min-width:190px}
    .dropdown-menu a{color:var(--text);padding:8px 12px;white-space:nowrap;text-decoration:none;font-weight:600;opacity:.92;border-radius:10px}
    .dropdown-menu a:hover,.dropdown-menu a.active{background:rgba(255,255,255,0.08);opacity:1}
    @media(max-width:720px){nav.nav{border-radius:22px;padding:10px}nav.nav a,.dropdown-toggle{width:100%}.dropdown{width:100%}.dropdown-menu{position:static;transform:none;margin-top:8px;min-width:0}}
    header{padding:36px 0 0;text-align:center}
    h1{font-family:"Space Grotesk";font-size:clamp(28px,4vw,42px)}
    section{padding:36px 0;max-width:680px;margin:auto}
    form{display:flex;flex-direction:column;gap:12px}
    input,textarea,button{padding:12px;border-radius:12px;border:1px solid var(--stroke);background:var(--card);color:var(--text);font-size:1rem}
    textarea{min-height:140px}
    button{background:linear-gradient(90deg,var(--acc),var(--acc2));border:none;color:#fff;font-weight:700;cursor:pointer}
    button:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
    .status,.form-note{margin:0 0 16px;padding:12px 14px;border-radius:12px;border:1px solid var(--stroke);background:var(--card);line-height:1.5}
    .status{display:none}
    .status.is-visible{display:block}
    .status.is-success{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.12);color:#dcfce7}
    .status.is-info{border-color:rgba(56,189,248,.35);background:rgba(14,165,233,.12);color:#dbeafe}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    footer{padding:18px 0;text-align:center;color:var(--muted);border-top:1px solid var(--stroke);background:rgba(255,255,255,.02)}
    .toggle{position:fixed;right:20px;bottom:20px;background:var(--card);border:1px solid var(--stroke);padding:10px 14px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow)}
  </style>
</head>
<body>
  <main class="container">
    <nav class="nav">
      <a href="index.html">Profil</a>
      <a href="competence.html">Compétences</a>
      <div class="dropdown">
        <span class="dropdown-toggle">Stages ▾</span>
        <div class="dropdown-menu">
          <a href="stage2026.html">Stage 2026</a>
          <a href="stage2025.html">Stage 2025</a>
        </div>
      </div>
      <a href="scolaire.html">Projets</a>
      <a href="veille.html">Veille Technologique</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>

    <header><h1>Contact</h1></header>

    <section>
      <p class="status" id="formStatus" role="status" aria-live="polite"></p>
      <p class="form-note">Les messages envoyes ici sont transmis a christianpopek115@gmail.com</p>
      <form action="https://formsubmit.co/christianpopek115@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Nouveau message - Portfolio Christian Popek">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" id="formNext">
        <input type="hidden" name="_url" id="formUrl">
        <label class="sr-only" for="website">Website</label>
        <input class="sr-only" id="website" name="_honey" type="text" tabindex="-1" autocomplete="off">
        <label for="nom">Nom</label>
        <input id="nom" name="name" type="text" placeholder="Votre nom" autocomplete="name" required>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="votre@email.com" autocomplete="email" required>
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Votre message..." required></textarea>
        <button type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <footer>© 2025 Popek Christian — Portfolio BTS SIO</footer>

  <div class="toggle" id="themeToggle">🌙/☀️</div>
  <script>
    const key='theme'; const saved=localStorage.getItem(key);
    if(saved) document.documentElement.setAttribute('data-theme',saved);
    document.getElementById('themeToggle').onclick=()=>{
      const cur=document.documentElement.getAttribute('data-theme')||'dark';
      const next=cur==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',next);
      localStorage.setItem(key,next);
    }

    const status=document.getElementById('formStatus');
    const nextInput=document.getElementById('formNext');
    const urlInput=document.getElementById('formUrl');
    const params=new URLSearchParams(window.location.search);
    const isHttp=window.location.protocol==='http:'||window.location.protocol==='https:';

    if(isHttp){
      const pageUrl=new URL(window.location.href);
      pageUrl.searchParams.delete('submitted');
      urlInput.value=pageUrl.href;

      const successUrl=new URL(pageUrl.href);
      successUrl.searchParams.set('submitted','1');
      nextInput.value=successUrl.href;
    }else{
      nextInput.disabled=true;
      urlInput.disabled=true;
    }

    if(params.get('submitted')==='1'){
      status.textContent='Message envoye. Merci, je te repondrai rapidement.';
      status.className='status is-visible is-success';
      if(window.history.replaceState){
        const cleanUrl=new URL(window.location.href);
        cleanUrl.searchParams.delete('submitted');
        window.history.replaceState({},'',cleanUrl);
      }
    }
  </script>
</body>
</html>
